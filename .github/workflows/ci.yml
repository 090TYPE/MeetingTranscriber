name: CI
on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Test
        run: dotnet test MeetingTranscriber.Tests --configuration Release --verbosity normal
